    <style>
      .preloader_container {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 9999999;
        background: #f0eee9;
        display: flex;
        justify-content: center;
        align-items: center;
        transform-origin: center center;
        will-change: transform, opacity;
        transition: transform 0.8s cubic-bezier(0.7,0,0.3,1), opacity 0.6s ease;
      }
      .preloader_container.zoom-out {
        transform: scale(30);
        opacity: 0;
        pointer-events: none;
      }
      .preloader {
        position: relative;
        width: 180px;
        height: 180px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .preloader .circle {
        position: absolute;
        width: 100%; height: 100%;
        z-index: 1;
        animation: spin-loader 12s linear infinite;
      }
      @keyframes spin-loader {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .preloader_letters {
        position: absolute;
        width: 130%; height: 130%;
        top: -15%; left: -15%;
        z-index: 10;
        font-size: 16pt;
        color: #484745;
        font-family: system-ui, sans-serif;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .preloader_letters div {
        position: absolute;
        opacity: 0;
        animation: fadeIn 0.3s ease forwards;
      }
      .preloader_letters .k { top: 0; left: 0;   animation-delay: 0.2s; }
      .preloader_letters .m { top: 0; right: 0;  animation-delay: 0.5s; }
      .preloader_letters .g { bottom: -12px; left: 50%; transform: translateX(-50%); animation-delay: 0.8s; }
      .preloader .logo {
        position: absolute;
        height: 90px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
      }
    </style>
